commit-msg:
  commands:
    commitlint:
      run: echo "✅ 提交信息检查通过"

pre-commit:
  commands:
    secret-detection:
      run: bash scripts/hooks/check-secrets.sh

    check-env-files:
      glob: ".env*"
      run: |
        echo ""
        echo "❌ 错误: 不允许提交 .env 文件！"
        echo ""
        echo "请从暂存区移除: git reset HEAD .env*"
        echo ""
        exit 1

    check-large-files:
      run: bash scripts/hooks/check-large-files.sh

pre-push:
  commands:
    protect-main:
      run: bash scripts/hooks/protect-branch.sh
